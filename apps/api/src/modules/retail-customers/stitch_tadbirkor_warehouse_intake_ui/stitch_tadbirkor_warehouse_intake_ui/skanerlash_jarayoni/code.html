<script>
        // Micro-interactions and feedback simulation
        const scannerInput = document.querySelector('input');
        
        scannerInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                // Simulate a scan success
                const val = this.value;
                this.value = '';
                
                // Visual feedback
                this.classList.add('border-primary');
                setTimeout(() => {
                    this.classList.remove('border-primary');
                }, 300);

                console.log('Scanned:', val);
            }
        });

        // Prevention of pull-to-refresh on mobile
        document.body.addEventListener('touchmove', function(e) {
            if (e.target.closest('.overflow-y-auto')) return;
            e.preventDefault();
        }, { passive: false });
    </script>
