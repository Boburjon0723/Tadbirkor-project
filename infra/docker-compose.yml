version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: axis-erp-postgres
    environment:
      POSTGRES_DB: axis_erp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: axis-erp-redis
    ports:
      - "6379:6379"

  api:
    build:
      context: ../apps/api
    container_name: axis-erp-api
    environment:
      PORT: 4002
      JWT_SECRET: your_super_secret_jwt_key_here
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/axis_erp
      TELEGRAM_BOT_USERNAME: tadbirkor_malumot_bot
    depends_on:
      - postgres
    ports:
      - "4002:4002"

  # Go parallel backend (Strangler Fig) — NestJS o'zgarmaydi
  backend:
    build:
      context: ../apps/backend
    container_name: axis-erp-backend
    environment:
      PORT: 4003
      NESTJS_URL: http://api:4002
      JWT_SECRET: your_super_secret_jwt_key_here
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/axis_erp
      REDIS_URL: redis://redis:6379
      CORS_ORIGINS: http://localhost:3000,http://localhost
      TELEGRAM_BOT_USERNAME: tadbirkor_malumot_bot
      TELEGRAM_UPDATES_ENABLED: "true"
    depends_on:
      - postgres
      - redis
      - api
    ports:
      - "4003:4003"

  web:
    build:
      context: ../apps/web
    container_name: axis-erp-web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4002/api
    depends_on:
      - api
    ports:
      - "3000:3000"

  nginx:
    image: nginx:alpine
    container_name: axis-erp-nginx
    depends_on:
      - web
      - api
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:

